spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

server.port=8099
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# -------------------------------------------------------
# 외부 봇/스캐너가 비정상 TCP 연결을 보낼 때 발생하는
# "Invalid character found in method name" 에러 로그 억제
# -------------------------------------------------------
logging.level.org.apache.coyote.http11.Http11Processor=OFF
logging.level.org.apache.coyote.http11=ERROR

# Tomcat 연결 타임아웃 설정 (악성 연결이 오래 점유하지 못하게)
server.tomcat.connection-timeout=5000
server.tomcat.max-connections=200
server.tomcat.accept-count=50
